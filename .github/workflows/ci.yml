name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        run: uv python install 3.12

      - name: Sync deps
        run: uv sync

      - name: Smoke test API
        run: |
          uv run python -c "from web_app import app; from fastapi.testclient import TestClient; c=TestClient(app); assert c.get('/health').status_code==200; r=c.get('/api/stock/SHB?days=30'); assert r.status_code==200"
